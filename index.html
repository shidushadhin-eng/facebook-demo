<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f0f2f5;
            margin: 0;
        }

        .header {
            background-color: #1877f2;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .post {
            background: white;
            width: 500px;
            margin: 20px auto;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        .post h3 {
            margin: 0;
        }

        .post p {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>Welcome to Home Page</h2>
</div>

<div class="post">
    <h3>John Doe</h3>
    <p>This is my first demo post 🚀</p>
</div>

<div class="post">
    <h3>Jane Smith</h3>
    <p>Hello everyone! This is another demo post.</p>
</div>

</body>
</html>
